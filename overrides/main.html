{% extends "base.html" %}

{% block scripts %}
{{ super() }}
<script>
if ('serviceWorker' in navigator) {
  const base = document.querySelector('script#__config') 
    ? JSON.parse(document.getElementById('__config').textContent).base 
    : '/';
  navigator.serviceWorker.register(base + 'sw.js', { scope: base }).catch(() => {});
}
</script>
{% endblock %}
