<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot Zombie Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f17;--surface:#16161f;--surface2:#1e1e2e;--surface3:#252535;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --purple:#a78bfa;--pink:#f472b6;--green:#34d399;--blue:#60a5fa;
  --orange:#fb923c;--red:#f87171;--yellow:#fbbf24;
  --text:#e2e8f0;--text-dim:#64748b;--text-mid:#94a3b8;
  --radius:12px;--radius-sm:7px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── Login ── */
#login-screen{
  position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;
  justify-content:center;z-index:1000;flex-direction:column;gap:1.5rem;padding:2rem;
}
#login-screen h1{
  font-size:2.2rem;font-weight:700;letter-spacing:-0.04em;
  background:linear-gradient(135deg,var(--purple),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.login-box{
  background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);
  padding:2rem;display:flex;flex-direction:column;gap:1rem;width:100%;max-width:420px;
}
.login-box label{font-size:.8rem;color:var(--text-mid);font-weight:500}
.login-box input{
  background:rgba(255,255,255,.05);border:1px solid var(--border2);border-radius:var(--radius-sm);
  color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.85rem;
  padding:.6rem .9rem;outline:none;width:100%;transition:border-color .2s;
}
.login-box input:focus{border-color:rgba(167,139,250,.5)}
.login-status{font-size:.78rem;min-height:1.2rem;text-align:center}
.btn-primary{
  background:linear-gradient(135deg,var(--purple),var(--pink));border:none;
  border-radius:var(--radius-sm);color:#fff;font-family:'Inter',sans-serif;
  font-size:.9rem;font-weight:600;padding:.7rem 1.4rem;cursor:pointer;
  transition:opacity .2s;width:100%;
}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled{opacity:.5;cursor:default}

/* ── App shell ── */
#app{display:none;min-height:100vh;flex-direction:column}

/* topbar */
#topbar{
  height:52px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 1.5rem;gap:1rem;position:sticky;top:0;z-index:100;
}
.logo{
  font-size:.9rem;font-weight:700;
  background:linear-gradient(135deg,var(--purple),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.bot-chip{
  display:flex;align-items:center;gap:.5rem;background:var(--surface2);
  border:1px solid var(--border2);border-radius:999px;padding:.25rem .75rem;
}
.bot-avatar{
  width:22px;height:22px;border-radius:50%;background:var(--purple);
  display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:#fff;
}
.bot-name{font-size:.8rem;font-weight:600}
.spacer{flex:1}
.tb-btn{
  background:rgba(255,255,255,.05);border:1px solid var(--border2);border-radius:var(--radius-sm);
  color:var(--text-mid);cursor:pointer;font-family:'Inter',sans-serif;font-size:.78rem;
  font-weight:500;padding:.35rem .85rem;transition:background .2s,color .2s;white-space:nowrap;
}
.tb-btn:hover{background:rgba(255,255,255,.1);color:var(--text)}
.tb-btn.danger{color:var(--red);border-color:rgba(248,113,113,.3)}
.tb-btn.danger:hover{background:rgba(248,113,113,.1)}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--text-dim);flex-shrink:0}
.status-dot.running{background:var(--green);box-shadow:0 0 6px var(--green)}

/* nav tabs */
#nav{
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;padding:0 1.5rem;gap:.25rem;
}
.nav-tab{
  padding:.65rem 1rem;font-size:.82rem;font-weight:500;cursor:pointer;
  color:var(--text-dim);border-bottom:2px solid transparent;transition:color .15s,border-color .15s;
}
.nav-tab.active{color:var(--purple);border-bottom-color:var(--purple)}
.nav-tab:hover{color:var(--text)}

/* main content */
#content{padding:2rem 1.5rem;max-width:1200px;margin:0 auto}

/* ── Module grid ── */
.section-header{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;
}
.section-title{font-size:1rem;font-weight:700}
.module-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem;
}
.module-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:1.25rem;cursor:pointer;transition:border-color .15s,box-shadow .15s;
  display:flex;flex-direction:column;gap:.75rem;
}
.module-card:hover{border-color:var(--border2);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.module-card.enabled{border-color:rgba(167,139,250,.3)}
.module-card-header{display:flex;align-items:center;gap:.6rem}
.module-icon{
  width:36px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;
  justify-content:center;font-size:1rem;flex-shrink:0;
}
.module-title{font-size:.88rem;font-weight:600;flex:1}
.module-type{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-dim)}
.module-desc{font-size:.78rem;color:var(--text-mid);line-height:1.5}
.module-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto}
.switch{position:relative;width:36px;height:20px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:rgba(255,255,255,.1);border-radius:999px;cursor:pointer;transition:background .2s}
.slider::before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .2s}
.switch input:checked+.slider{background:var(--purple)}
.switch input:checked+.slider::before{transform:translateX(16px)}
.add-module-card{
  background:transparent;border:1.5px dashed var(--border2);border-radius:var(--radius);
  padding:1.25rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
  gap:.5rem;color:var(--text-dim);font-size:.85rem;font-weight:500;
  transition:border-color .15s,color .15s;min-height:120px;
}
.add-module-card:hover{border-color:var(--purple);color:var(--purple)}

/* ── Bot controls panel ── */
#bot-panel{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:1.5rem;margin-bottom:1.5rem;
}
.bot-panel-row{display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.stat-chip{
  background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:.35rem .75rem;font-size:.78rem;color:var(--text-mid);
}
.stat-chip span{color:var(--text);font-weight:600}
#log-box{
  background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:var(--radius-sm);
  font-family:'JetBrains Mono',monospace;font-size:.72rem;line-height:1.6;
  color:#94a3b8;padding:.75rem;max-height:200px;overflow-y:auto;margin-top:1rem;
  white-space:pre-wrap;word-break:break-all;
}
#log-box::-webkit-scrollbar{width:4px}
#log-box::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── HTML Embed builder ── */
#embed-builder{display:none}
.embed-layout{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
@media(max-width:768px){.embed-layout{grid-template-columns:1fr}}
.embed-canvas{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:1rem;min-height:400px;
}
.embed-preview{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:1rem;display:flex;flex-direction:column;gap:.75rem;
}
.embed-preview-frame{
  background:#1a1a2e;border-radius:var(--radius-sm);padding:1rem;min-height:300px;
  overflow:auto;
}
.embed-block{
  background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:.75rem;margin-bottom:.5rem;cursor:grab;position:relative;
}
.embed-block:active{cursor:grabbing}
.embed-block-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem}
.embed-block-type{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--purple)}
.embed-block-del{
  position:absolute;top:.5rem;right:.5rem;background:none;border:none;
  color:var(--text-dim);cursor:pointer;font-size:.8rem;transition:color .15s;
}
.embed-block-del:hover{color:var(--red)}
.embed-palette{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem}
.embed-pal-btn{
  background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);
  color:var(--text-mid);cursor:pointer;font-size:.75rem;font-weight:500;padding:.3rem .7rem;
  transition:background .15s,color .15s;
}
.embed-pal-btn:hover{background:var(--surface3);color:var(--text)}
.field{display:flex;flex-direction:column;gap:.2rem;margin-bottom:.4rem}
.field label{font-size:.7rem;color:var(--text-dim);font-weight:500}
.field input,.field textarea,.field select{
  background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:5px;
  color:var(--text);font-family:'Inter',sans-serif;font-size:.78rem;
  padding:.3rem .5rem;outline:none;width:100%;transition:border-color .15s;
}
.field input:focus,.field textarea:focus,.field select:focus{border-color:rgba(167,139,250,.4)}
.field textarea{resize:vertical;min-height:50px;font-family:'JetBrains Mono',monospace;font-size:.72rem}
.field select option{background:var(--surface2)}

/* ── Code editor tab ── */
#code-tab{display:none}
#code-editor{
  width:100%;height:calc(100vh - 200px);background:rgba(0,0,0,.3);
  border:1px solid var(--border);border-radius:var(--radius);
  font-family:'JetBrains Mono',monospace;font-size:.8rem;line-height:1.7;
  color:var(--text);padding:1.25rem;outline:none;resize:none;
}

/* ── Modal ── */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
  z-index:500;display:none;align-items:center;justify-content:center;padding:2rem;
}
.modal-backdrop.open{display:flex}
.modal{
  background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);
  width:100%;max-width:480px;padding:1.5rem;display:flex;flex-direction:column;gap:1rem;
}
.modal h2{font-size:1rem;font-weight:700}
.modal-footer{display:flex;gap:.75rem;justify-content:flex-end}
.btn{
  background:rgba(255,255,255,.05);border:1px solid var(--border2);border-radius:var(--radius-sm);
  color:var(--text-mid);cursor:pointer;font-family:'Inter',sans-serif;font-size:.82rem;
  font-weight:500;padding:.45rem 1rem;transition:background .2s;
}
.btn:hover{background:rgba(255,255,255,.1);color:var(--text)}
.btn.primary{
  background:linear-gradient(135deg,var(--purple),var(--pink));border:none;
  color:#fff;font-weight:600;
}
.btn.primary:hover{opacity:.9}
.hint{font-size:.75rem;color:var(--text-dim);line-height:1.5}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .2s ease both}
</style>
</head>
<body>
<!-- Login screen -->
<div id="login-screen">
  <h1>Bot Zombie</h1>
  <p style="color:var(--text-mid);font-size:.9rem;text-align:center;max-width:380px;line-height:1.6">
    Enter your Nerimity bot token to open the dashboard. The server must be running locally.
  </p>
  <div class="login-box">
    <label>Bot token</label>
    <input id="token-input" type="password" placeholder="paste your token here…" autocomplete="off">
    <div class="login-status" id="login-status"></div>
    <button class="btn-primary" id="login-btn" onclick="doLogin()">Connect →</button>
  </div>
  <a href="./" style="color:var(--text-dim);font-size:.8rem;text-decoration:none">← back to docs</a>
</div>

<!-- App -->
<div id="app">
  <!-- Topbar -->
  <div id="topbar">
    <span class="logo">bot zombie</span>
    <span style="font-size:.68rem;color:var(--text-dim);background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:999px;padding:.1rem .55rem">v1.3.1</span>
    <div class="bot-chip" id="bot-chip">
      <div class="bot-avatar" id="bot-avatar">B</div>
      <span class="bot-name" id="bot-name-display">Bot</span>
      <div class="status-dot" id="status-dot"></div>
    </div>
    <div class="spacer"></div>
    <button class="tb-btn" onclick="openBuilder()">🧩 Builder</button>

    <button class="tb-btn danger" onclick="doLogout()">Logout</button>
  </div>

  <!-- Nav -->
  <div id="nav">
    <div class="nav-tab active" onclick="showTab('dashboard')">Dashboard</div>
    <div class="nav-tab" onclick="showTab('embed')">HTML Embed</div>
  </div>

  <!-- Content -->
  <div id="content">

    <!-- Dashboard tab -->
    <div id="tab-dashboard">
      <!-- Modules -->
      <div class="section-header">
        <span class="section-title">Commands & Events</span>
        <button class="btn" onclick="openAddModule()">+ Add module</button>
      </div>
      <div class="module-grid" id="module-grid">
        <!-- populated by JS -->
      </div>
    </div>

    <!-- Embed builder tab -->
    <div id="tab-embed" style="display:none">
      <div class="section-header">
        <span class="section-title">HTML Embed Builder</span>
        <div style="display:flex;gap:.5rem">
          <button class="btn" onclick="copyEmbedHtml()">Copy HTML</button>
          <button class="btn primary" onclick="sendEmbed()">Send to channel</button>
        </div>
      </div>
      <div class="embed-layout">
        <!-- Left: block palette + canvas -->
        <div>
          <div class="embed-palette">
            <button class="embed-pal-btn" onclick="addEmbedBlock('text')">+ Text</button>
            <button class="embed-pal-btn" onclick="addEmbedBlock('heading')">+ Heading</button>
            <button class="embed-pal-btn" onclick="addEmbedBlock('button')">+ Button</button>
            <button class="embed-pal-btn" onclick="addEmbedBlock('divider')">+ Divider</button>
            <button class="embed-pal-btn" onclick="addEmbedBlock('image')">+ Image</button>
            <button class="embed-pal-btn" onclick="addEmbedBlock('badge')">+ Badge</button>
            <button class="embed-pal-btn" onclick="addEmbedBlock('card')">+ Card</button>
          </div>
          <div class="embed-canvas" id="embed-canvas">
            <div style="color:var(--text-dim);font-size:.82rem;text-align:center;padding:2rem">
              Click a block type above to add it
            </div>
          </div>
          <div class="field" style="margin-top:1rem">
            <label>Send to channel ID</label>
            <input id="embed-channel" placeholder="YOUR_CHANNEL_ID">
          </div>
        </div>
        <!-- Right: live preview -->
        <div class="embed-preview">
          <div style="font-size:.78rem;font-weight:600;color:var(--text-mid)">Live Preview</div>
          <div class="embed-preview-frame" id="embed-preview-frame"></div>
          <div>
            <div style="font-size:.72rem;color:var(--text-dim);margin-bottom:.35rem">Generated HTML</div>
            <textarea id="embed-html-out" style="width:100%;height:120px;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.7rem;padding:.5rem;outline:none;resize:vertical" readonly></textarea>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /content -->
</div><!-- /app -->

<!-- Add module modal -->
<div class="modal-backdrop" id="add-modal">
  <div class="modal fade-in">
    <h2>Add Module</h2>
    <div class="field"><label>Type</label>
      <select id="mod-type">
        <option value="command">Command</option>
        <option value="event">Event</option>
        <option value="plugin">Plugin</option>
      </select>
    </div>
    <div class="field"><label>Name / trigger</label>
      <input id="mod-name" placeholder="e.g. ping or member_joined">
    </div>
    <div class="field"><label>Description</label>
      <input id="mod-desc" placeholder="What this module does">
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('add-modal')">Cancel</button>
      <button class="btn primary" onclick="addModule()">Add</button>
    </div>
  </div>
</div>

<script>
const API = '';
let BOT_TOKEN = '';
let BOT_INFO = null;
let modules = JSON.parse(localStorage.getItem('bz_modules') || '[]');
let embedBlocks = [];

// ── Login ──────────────────────────────────────────────────────────────────
async function doLogin() {
  const token = document.getElementById('token-input').value.trim();
  if (!token) return;
  const btn = document.getElementById('login-btn');
  const status = document.getElementById('login-status');
  btn.disabled = true;
  status.style.color = 'var(--text-mid)';
  status.textContent = 'Verifying…';
  try {
    const res = await fetch(`${API}/api/verify`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({token})
    });
    const data = await res.json();
    if (data.ok) {
      BOT_TOKEN = token;
      BOT_INFO = data.bot;
      localStorage.setItem('bz_token', token);
      status.style.color = 'var(--green)';
      status.textContent = '✓ Connected!';
      setTimeout(openApp, 500);
    } else {
      status.style.color = 'var(--red)';
      status.textContent = `✗ Invalid token (${data.status})`;
      btn.disabled = false;
    }
  } catch(e) {
    status.style.color = 'var(--red)';
    status.textContent = '✗ Cannot reach server. Is dashboard_server.py running?';
    btn.disabled = false;
  }
}

function openApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('app').style.flexDirection = 'column';
  const info = BOT_INFO?.bot || BOT_INFO || {};
  const name = info.username || 'Bot';
  document.getElementById('bot-name-display').textContent = name;
  document.getElementById('bot-avatar').textContent = name[0].toUpperCase();
  renderModules();
}

function doLogout() {
  BOT_TOKEN = ''; BOT_INFO = null;
  localStorage.removeItem('bz_token');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('token-input').value = '';
  document.getElementById('login-status').textContent = '';
  document.getElementById('login-btn').disabled = false;
}

// ── Tabs ───────────────────────────────────────────────────────────────────
function showTab(name) {
  ['dashboard','embed'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===name ? '' : 'none';
  });
  document.querySelectorAll('.nav-tab').forEach((el,i) => {
    el.classList.toggle('active', ['dashboard','embed'][i] === name);
  });
}

// ── Modules ────────────────────────────────────────────────────────────────
const MODULE_ICONS = {command:'💬', event:'⚡', plugin:'🧩'};
const MODULE_COLORS = {command:'rgba(167,139,250,.15)', event:'rgba(96,165,250,.15)', plugin:'rgba(52,211,153,.15)'};

function saveModules() { localStorage.setItem('bz_modules', JSON.stringify(modules)); }

function renderModules() {
  const grid = document.getElementById('module-grid');
  grid.innerHTML = '';
  modules.forEach((mod, i) => {
    const card = document.createElement('div');
    card.className = 'module-card' + (mod.enabled ? ' enabled' : '');
    card.innerHTML = `
      <div class="module-card-header">
        <div class="module-icon" style="background:${MODULE_COLORS[mod.type]||MODULE_COLORS.command}">${MODULE_ICONS[mod.type]||'💬'}</div>
        <div>
          <div class="module-title">${esc(mod.name)}</div>
          <div class="module-type">${mod.type}</div>
        </div>
      </div>
      <div class="module-desc">${esc(mod.desc||'No description')}</div>
      <div class="module-footer">
        <label class="switch" onclick="event.stopPropagation()">
          <input type="checkbox" ${mod.enabled?'checked':''} onchange="toggleModule(${i},this.checked)">
          <span class="slider"></span>
        </label>
        <div style="display:flex;gap:.4rem">
          <button class="tb-btn" onclick="event.stopPropagation();editModule(${i})" style="padding:.25rem .6rem;font-size:.72rem">Edit</button>
          <button class="tb-btn danger" onclick="event.stopPropagation();deleteModule(${i})" style="padding:.25rem .6rem;font-size:.72rem">✕</button>
        </div>
      </div>`;
    card.onclick = () => editModule(i);
    grid.appendChild(card);
  });
  const add = document.createElement('div');
  add.className = 'add-module-card';
  add.innerHTML = '+ Add module';
  add.onclick = openAddModule;
  grid.appendChild(add);
}

function toggleModule(i, val) {
  modules[i].enabled = val;
  saveModules();
  renderModules();
}

function deleteModule(i) {
  modules.splice(i, 1);
  saveModules();
  renderModules();
}

function openAddModule() {
  document.getElementById('mod-name').value = '';
  document.getElementById('mod-desc').value = '';
  document.getElementById('add-modal').classList.add('open');
}

function addModule() {
  const name = document.getElementById('mod-name').value.trim();
  if (!name) return;
  modules.push({
    type: document.getElementById('mod-type').value,
    name,
    desc: document.getElementById('mod-desc').value.trim(),
    enabled: true,
    nodes: [], wires: [],
  });
  saveModules();
  renderModules();
  closeModal('add-modal');
}

function editModule(i) {
  const mod = modules[i];
  localStorage.setItem('bz_edit_module_idx', i);
  localStorage.setItem('bz_edit_module', JSON.stringify(mod));
  document.getElementById('editor-modal').classList.add('open');
  // load editor in iframe
  const iframe = document.getElementById('editor-iframe');
  iframe.src = './editor.html';
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ── Bot controls ───────────────────────────────────────────────────────────
// ── HTML Embed builder ─────────────────────────────────────────────────────
let embedIdSeq = 0;

const EMBED_DEFAULTS = {
  text:    {text:'Hello world!', color:'#e2e8f0', size:'14', align:'left'},
  heading: {text:'My Heading', color:'#a78bfa', size:'24', align:'center', weight:'700'},
  button:  {label:'Click me', bg:'#a78bfa', color:'#ffffff', radius:'8'},
  divider: {color:'rgba(255,255,255,0.1)', margin:'12'},
  image:   {src:'https://placekitten.com/400/200', radius:'8', width:'100%'},
  badge:   {text:'NEW', bg:'#a78bfa', color:'#fff'},
  card:    {bg:'rgba(255,255,255,0.05)', padding:'16', radius:'10', text:'Card content here'},
};

function addEmbedBlock(type) {
  const id = ++embedIdSeq;
  const props = {...EMBED_DEFAULTS[type]};
  embedBlocks.push({id, type, props});
  renderEmbedCanvas();
  updateEmbedPreview();
}

function removeEmbedBlock(id) {
  embedBlocks = embedBlocks.filter(b => b.id !== id);
  renderEmbedCanvas();
  updateEmbedPreview();
}

function renderEmbedCanvas() {
  const canvas = document.getElementById('embed-canvas');
  if (!embedBlocks.length) {
    canvas.innerHTML = '<div style="color:var(--text-dim);font-size:.82rem;text-align:center;padding:2rem">Click a block type above to add it</div>';
    return;
  }
  canvas.innerHTML = embedBlocks.map(b => `
    <div class="embed-block" data-id="${b.id}">
      <button class="embed-block-del" onclick="removeEmbedBlock(${b.id})">✕</button>
      <div class="embed-block-header"><span class="embed-block-type">${b.type}</span></div>
      ${renderEmbedFields(b)}
    </div>`).join('');
  // attach input listeners
  canvas.querySelectorAll('[data-bid]').forEach(el => {
    el.addEventListener('input', () => {
      const bid = +el.dataset.bid, key = el.dataset.key;
      const block = embedBlocks.find(b => b.id === bid);
      if (block) { block.props[key] = el.value; updateEmbedPreview(); }
    });
  });
}

function renderEmbedFields(b) {
  const fields = {
    text:    [{k:'text',l:'Text',t:'textarea'},{k:'color',l:'Color',t:'color'},{k:'size',l:'Font size',t:'text'},{k:'align',l:'Align',t:'select',opts:['left','center','right']}],
    heading: [{k:'text',l:'Text',t:'text'},{k:'color',l:'Color',t:'color'},{k:'size',l:'Font size',t:'text'},{k:'align',l:'Align',t:'select',opts:['left','center','right']}],
    button:  [{k:'label',l:'Label',t:'text'},{k:'bg',l:'Background',t:'color'},{k:'color',l:'Text color',t:'color'},{k:'radius',l:'Border radius',t:'text'}],
    divider: [{k:'color',l:'Color',t:'color'},{k:'margin',l:'Margin (px)',t:'text'}],
    image:   [{k:'src',l:'Image URL',t:'text'},{k:'radius',l:'Border radius',t:'text'},{k:'width',l:'Width',t:'text'}],
    badge:   [{k:'text',l:'Text',t:'text'},{k:'bg',l:'Background',t:'color'},{k:'color',l:'Text color',t:'color'}],
    card:    [{k:'text',l:'Content',t:'textarea'},{k:'bg',l:'Background',t:'color'},{k:'padding',l:'Padding',t:'text'},{k:'radius',l:'Border radius',t:'text'}],
  };
  return (fields[b.type]||[]).map(f => {
    const val = b.props[f.k] || '';
    if (f.t === 'textarea') return `<div class="field"><label>${f.l}</label><textarea data-bid="${b.id}" data-key="${f.k}">${esc(val)}</textarea></div>`;
    if (f.t === 'select') return `<div class="field"><label>${f.l}</label><select data-bid="${b.id}" data-key="${f.k}">${(f.opts||[]).map(o=>`<option ${val===o?'selected':''}>${o}</option>`).join('')}</select></div>`;
    if (f.t === 'color') return `<div class="field"><label>${f.l}</label><div style="display:flex;gap:.4rem;align-items:center"><input type="color" data-bid="${b.id}" data-key="${f.k}" value="${val||'#ffffff'}" style="width:36px;height:28px;padding:0;border:none;background:none;cursor:pointer"><input type="text" data-bid="${b.id}" data-key="${f.k}" value="${esc(val)}" style="flex:1"></div></div>`;
    return `<div class="field"><label>${f.l}</label><input type="text" data-bid="${b.id}" data-key="${f.k}" value="${esc(val)}"></div>`;
  }).join('');
}

function blockToHtml(b) {
  const p = b.props;
  switch(b.type) {
    case 'text':    return `<p style="color:${p.color};font-size:${p.size}px;text-align:${p.align};margin:4px 0">${esc(p.text)}</p>`;
    case 'heading': return `<h2 style="color:${p.color};font-size:${p.size}px;text-align:${p.align};font-weight:${p.weight||700};margin:8px 0">${esc(p.text)}</h2>`;
    case 'button':  return `<div style="text-align:center;margin:8px 0"><span style="display:inline-block;background:${p.bg};color:${p.color};padding:8px 20px;border-radius:${p.radius}px;font-weight:600;font-size:14px">${esc(p.label)}</span></div>`;
    case 'divider': return `<hr style="border:none;border-top:1px solid ${p.color};margin:${p.margin}px 0">`;
    case 'image':   return `<img src="${esc(p.src)}" style="width:${p.width};border-radius:${p.radius}px;display:block;margin:8px auto">`;
    case 'badge':   return `<span style="display:inline-block;background:${p.bg};color:${p.color};padding:2px 10px;border-radius:999px;font-size:11px;font-weight:700">${esc(p.text)}</span>`;
    case 'card':    return `<div style="background:${p.bg};padding:${p.padding}px;border-radius:${p.radius}px;margin:8px 0;font-size:14px">${esc(p.text)}</div>`;
    default: return '';
  }
}

function buildEmbedHtml() {
  return `<div style="font-family:sans-serif;padding:16px">${embedBlocks.map(blockToHtml).join('')}</div>`;
}

function updateEmbedPreview() {
  const html = buildEmbedHtml();
  document.getElementById('embed-preview-frame').innerHTML = html;
  document.getElementById('embed-html-out').value = html;
}

function copyEmbedHtml() {
  navigator.clipboard.writeText(buildEmbedHtml());
  alert('HTML copied!');
}

async function sendEmbed() {
  const channel = document.getElementById('embed-channel').value.trim();
  if (!channel) { alert('Enter a channel ID first.'); return; }
  const html = buildEmbedHtml();
  const res = await fetch(`${API}/api/send_embed`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({token: BOT_TOKEN, channel_id: channel, html})
  });
  const data = await res.json();
  if (data.ok) alert('Sent!');
  else alert('Failed: ' + JSON.stringify(data));
}

// ── Utils ──────────────────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Auto-login if token saved ──────────────────────────────────────────────
window.addEventListener('load', () => {
  const saved = localStorage.getItem('bz_token');
  if (saved) {
    document.getElementById('token-input').value = saved;
    doLogin();
  }
});

// ── Handle editor iframe messages ──────────────────────────────────────────────────
window.addEventListener('message', (e) => {
  if (e.data.action === 'save_module') {
    const idx = e.data.index;
    modules[idx] = e.data.module;
    saveModules();
    renderModules();
  }
});
</script>

    <div style="display:flex;justify-content:space-between;align-items:center;padding:1rem;border-bottom:1px solid var(--border)">
      <h2 style="margin:0">Edit Module</h2>
      <button class="tb-btn" onclick="closeModal('editor-modal')">✕</button>
    </div>
    <iframe id="editor-iframe" style="flex:1;border:none;background:var(--bg)"></iframe>
  </div>
</div>
