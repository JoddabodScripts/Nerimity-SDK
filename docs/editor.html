<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Module Editor</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f17;--surface:#16161f;--surface2:#1e1e2e;--surface3:#252535;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --purple:#a78bfa;--pink:#f472b6;--green:#34d399;--blue:#60a5fa;
  --text:#e2e8f0;--text-dim:#64748b;--text-mid:#94a3b8;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);margin:0;padding:1rem}
.editor-layout{display:grid;grid-template-columns:1fr 1fr;gap:1rem;height:100%}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem;overflow:auto}
.panel h3{font-size:.9rem;font-weight:700;margin-bottom:.75rem}
.btn{background:rgba(255,255,255,.05);border:1px solid var(--border2);border-radius:6px;color:var(--text-mid);cursor:pointer;font-size:.78rem;font-weight:500;padding:.35rem .85rem;width:100%;margin-bottom:.5rem}
.btn:hover{background:rgba(255,255,255,.1);color:var(--text)}
.btn.primary{background:linear-gradient(135deg,var(--purple),var(--pink));border:none;color:#fff}
textarea{width:100%;height:200px;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.75rem;padding:.5rem;outline:none}
</style>
</head>
<body>
<div class="editor-layout">
  <div class="panel">
    <h3>Module Info</h3>
    <div style="margin-bottom:.75rem">
      <label style="font-size:.75rem;color:var(--text-dim)">Name</label>
      <input id="mod-name" type="text" style="width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:.35rem;font-size:.78rem">
    </div>
    <div style="margin-bottom:.75rem">
      <label style="font-size:.75rem;color:var(--text-dim)">Type</label>
      <select id="mod-type" style="width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:.35rem;font-size:.78rem">
        <option>command</option>
        <option>event</option>
        <option>plugin</option>
      </select>
    </div>
    <h3 style="margin-top:1.5rem">Code</h3>
    <textarea id="mod-code" placeholder="# Your module code here…"></textarea>
    <button class="btn primary" onclick="saveModule()" style="margin-top:.75rem">Save</button>
  </div>
  <div class="panel">
    <h3>Preview</h3>
    <pre id="preview" style="background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:6px;padding:.75rem;font-size:.7rem;line-height:1.6;color:#94a3b8;overflow:auto;height:100%;white-space:pre-wrap;word-break:break-all"></pre>
  </div>
</div>

<script>
const modIdx = localStorage.getItem('bz_edit_module_idx');
const mod = JSON.parse(localStorage.getItem('bz_edit_module') || '{}');

document.getElementById('mod-name').value = mod.name || '';
document.getElementById('mod-type').value = mod.type || 'command';
document.getElementById('mod-code').value = mod.code || '';

document.getElementById('mod-code').addEventListener('input', () => {
  document.getElementById('preview').textContent = document.getElementById('mod-code').value;
});

function saveModule() {
  const updated = {
    ...mod,
    name: document.getElementById('mod-name').value,
    type: document.getElementById('mod-type').value,
    code: document.getElementById('mod-code').value,
  };
  localStorage.setItem('bz_edit_module', JSON.stringify(updated));
  // notify parent
  window.parent.postMessage({action: 'save_module', index: modIdx, module: updated}, '*');
  window.parent.document.getElementById('editor-modal').classList.remove('open');
}

// trigger preview on load
document.getElementById('preview').textContent = mod.code || '';
</script>
</body>
</html>
