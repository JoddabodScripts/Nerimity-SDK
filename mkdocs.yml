site_name: nerimity-sdk
site_description: A fully-featured Python SDK for building Nerimity bots
site_url: https://joddabodscripts.github.io/Nerimity-SDK/
repo_url: https://github.com/JoddabodScripts/Nerimity-SDK
repo_name: Nerimity-SDK

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: purple
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.instant.progress
    - content.code.copy
    - search.highlight
    - search.suggest
    - search.share

extra_css:
  - stylesheets/custom.css

plugins:
  - search:
      lang: en

extra:
  generator: false
  meta:
    - name: google-site-verification
      content: gtMtSACbLxzOGzCPi9aMA-0gbRoqLJUhj6n5B5URnZw

copyright: "Built by <a href='https://github.com/JoddabodScripts'>JoddabodScripts</a> · @Lyney:SHOW on Nerimity"

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - tables
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: guide/installation.md
    - Quick Start: guide/quickstart.md
    - Configuration: guide/configuration.md
    - Recipes: guide/recipes.md
    - Hosting (24/7): guide/hosting.md
    - Troubleshooting: guide/troubleshooting.md
  - API Reference:
    - Bot: api/bot.md
    - Context: api/context.md
    - Commands: api/commands.md
    - Slash Commands: api/slash.md
    - Buttons: api/buttons.md
    - Events: api/events.md
    - Webhooks: api/webhooks.md
    - OAuth2: api/oauth2.md
    - Cache: api/cache.md
    - Permissions: api/permissions.md
    - Plugins: api/plugins.md
    - Storage: api/storage.md
    - Scheduler: api/scheduler.md
    - Utilities: api/utils.md
  - Example Bot: example.md
  - Plugin Marketplace: plugins.md
  - Changelog: changelog.md
