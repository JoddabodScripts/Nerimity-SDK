site_name: nerimity-sdk
site_description: A fully-featured Python SDK for building Nerimity bots
site_url: https://joddabodscripts.github.io/Nerimity-SDK/
repo_url: https://github.com/JoddabodScripts/Nerimity-SDK
repo_name: Nerimity-SDK
edit_uri: edit/master/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: purple
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.instant.progress
    - content.code.copy
    - content.action.edit
    - search.highlight
    - search.suggest
    - search.share

extra_css:
  - stylesheets/custom.css

extra_javascript:
  - javascripts/transitions.js

plugins:
  - search:
      lang: en

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/JoddabodScripts/Nerimity-SDK
  meta:
    - name: google-site-verification
      content: gtMtSACbLxzOGzCPi9aMA-0gbRoqLJUhj6n5B5URnZw
    - property: og:type
      content: website
    - property: og:title
      content: nerimity-sdk — Python SDK for Nerimity bots
    - property: og:description
      content: A fully-featured Python SDK for building bots on Nerimity. Commands, events, plugins, storage, OAuth2 and more.
    - property: og:image
      content: https://joddabodscripts.github.io/Nerimity-SDK/assets/og-image.png
    - property: og:url
      content: https://joddabodscripts.github.io/Nerimity-SDK/
    - name: twitter:card
      content: summary_large_image

copyright: "Built by <a href='https://github.com/JoddabodScripts'>JoddabodScripts</a> · @Lyney:SHOW on Nerimity"

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - tables
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: guide/installation.md
    - Quick Start: guide/quickstart.md
    - Configuration: guide/configuration.md
    - Recipes: guide/recipes.md
    - Contrib Plugins: guide/contrib.md
    - Sharding: guide/sharding.md
    - Rate Limiting: guide/rate-limiting.md
    - Security: guide/security.md
    - Hosting (24/7): guide/hosting.md
    - Troubleshooting: guide/troubleshooting.md
  - API Reference:
    - Bot: api/bot.md
    - Context: api/context.md
    - Commands: api/commands.md
    - Slash Commands: api/slash.md
    - Buttons: api/buttons.md
    - Events: api/events.md
    - REST Client: api/rest.md
    - Webhooks: api/webhooks.md
    - OAuth2: api/oauth2.md
    - Error Types: api/errors.md
    - Cache: api/cache.md
    - Permissions: api/permissions.md
    - Plugins: api/plugins.md
    - Storage: api/storage.md
    - Scheduler: api/scheduler.md
    - Utilities: api/utils.md
  - Example Bot: example.md
  - Plugin Marketplace: plugins.md
  - Changelog: changelog.md
  - Glossary: glossary.md
  - Contributing: contributing.md
